server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # 1) Never cache the HTML entrypoint
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        etag off;
        if_modified_since off;

        try_files $uri =404;
    }

    # 2) Cache static assets aggressively (CRA/Vite builds are fingerprinted)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # If your build outputs to /static instead of /assets, include this too:
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 3) SPA routing fallback (serves index.html, but index.html location above controls caching)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 4) Proxy API
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
